<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BissRadar Map Picker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

#map {
  width: 100%;
  height: 100vh;
}

#confirmBtn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;

  background: #2563eb;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<button id="confirmBtn">
Standort übernehmen
</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const userId = params.get('user_id');

alert("User ID: " + userId);

let selectedLat = 51.0;
let selectedLon = 10.0;

const map = L.map('map').setView([51.0, 10.0], 6);

L.tileLayer(
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }
).addTo(map);

let marker;

/*
========================================
GPS TEST
========================================
*/

alert("Geolocation vorhanden: " + !!navigator.geolocation);

if (navigator.geolocation) {

  navigator.geolocation.getCurrentPosition(

    (position) => {

      alert("GPS OK");

      selectedLat = position.coords.latitude;
      selectedLon = position.coords.longitude;

      map.setView(
        [selectedLat, selectedLon],
        15
      );

      marker = L.marker(
        [selectedLat, selectedLon]
      ).addTo(map);

    },

    (error) => {

      alert(
        "GPS FEHLER: " +
        error.code +
        " / " +
        error.message
      );

      console.log(error);

      alert(
        "Standort konnte nicht automatisch ermittelt werden. Bitte Standort manuell auf der Karte wählen."
      );

    },

    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }

  );

} else {

  alert("navigator.geolocation existiert nicht");

}

/*
========================================
MARKER SETZEN
========================================
*/

map.on('click', function(e){

  selectedLat = e.latlng.lat;
  selectedLon = e.latlng.lng;

  if(marker){
    map.removeLayer(marker);
  }

  marker = L.marker([
    selectedLat,
    selectedLon
  ]).addTo(map);

});

/*
========================================
SPEICHERN
========================================
*/

document
.getElementById('confirmBtn')
.addEventListener('click', async () => {

  try {

    alert("Sende Anfrage...");

    const response = await fetch(
      'https://svocbqbbdyjuhkyreamv.supabase.co/functions/v1/clever-endpoint',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          user_id: userId,
          latitude: selectedLat,
          longitude: selectedLon
        })
      }
    );

    const text = await response.text();

    alert("Antwort: " + text);

    console.log(text);

  } catch(error){

    console.log(error);

    alert("FEHLER: " + error);

  }

});

</script>

</body>
</html>
